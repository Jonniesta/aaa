<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABA Tracker</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2563eb" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Daily Data</p>
      <h1>ABA Tracker</h1>
    </div>
    <button class="ghost" type="button" onclick="clearForm()">New</button>
  </header>

  <main class="app-shell">
    <section class="summary-card">
      <div>
        <span>Total</span>
        <strong id="totalCount">0</strong>
      </div>
      <div>
        <span>Trials</span>
        <strong id="trialAccuracy">0%</strong>
      </div>
      <div>
        <span>Saved</span>
        <strong id="savedCount">0</strong>
      </div>
    </section>

    <section class="card">
      <h2>Session</h2>
      <div class="grid-2">
        <label>Client<input id="clientName" type="text" placeholder="Client name" /></label>
        <label>Date<input id="sessionDate" type="date" /></label>
      </div>
      <label>RBT Name<input id="rbtName" type="text" placeholder="Your name" /></label>
      <button class="small-btn" type="button" onclick="saveDefaultRBT()">Save RBT Default</button>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Tally Targets</h2>
        <span class="hint">Independent / Prompted</span>
      </div>
      <div id="tallyTargets" class="target-list"></div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Trial Targets</h2>
        <span class="hint">5 opportunities each</span>
      </div>
      <div id="trialTargets" class="target-list"></div>
    </section>

    <section class="card">
      <h2>Emotion Communication</h2>
      <div class="grid-2">
        <label>Emotion 1<input id="emotion1" type="text" placeholder="Emotion" /></label>
        <label>Why?<input id="emotionWhy1" type="text" placeholder="Reason/context" /></label>
        <label>Emotion 2<input id="emotion2" type="text" placeholder="Emotion" /></label>
        <label>Why?<input id="emotionWhy2" type="text" placeholder="Reason/context" /></label>
      </div>
    </section>

    <section class="card">
      <h2>DTT Questions</h2>
      <div id="dttTargets" class="target-list"></div>
    </section>

    <section class="card">
      <h2>Teacher Targets</h2>
      <div id="teacherTargets" class="target-list"></div>
    </section>

    <section class="card">
      <h2>Specials</h2>
      <div class="grid-2">
        <label>Special<input id="specialName" type="text" placeholder="Music, PE, art, etc." /></label>
        <label>Duration Before Break<input id="specialDuration" type="text" placeholder="Example: 12 min" /></label>
      </div>
      <label>Tolerated aversive sounds</label>
      <div class="segmented" data-field="specialSounds">
        <button type="button" onclick="setSegment(this,'+')">+</button>
        <button type="button" onclick="setSegment(this,'-')">-</button>
        <button type="button" onclick="setSegment(this,'N/A')">N/A</button>
      </div>
    </section>

    <section class="card">
      <h2>Group Instruction</h2>
      <div class="counter-row">
        <span>Independent</span>
        <button type="button" onclick="changeSimpleCount('groupIndependent',-1)">−</button>
        <strong id="groupIndependent">0</strong>
        <button type="button" onclick="changeSimpleCount('groupIndependent',1)">+</button>
      </div>
      <div class="counter-row">
        <span>Prompted</span>
        <button type="button" onclick="changeSimpleCount('groupPrompted',-1)">−</button>
        <strong id="groupPrompted">0</strong>
        <button type="button" onclick="changeSimpleCount('groupPrompted',1)">+</button>
      </div>
    </section>

    <section class="card">
      <h2>Session Notes</h2>
      <textarea id="notes" placeholder="Write short session notes here..."></textarea>
    </section>

    <section class="card">
      <h2>Saved Sessions</h2>
      <div id="history" class="history"></div>
    </section>
  </main>

  <nav class="bottom-actions">
    <button id="saveButton" type="button" onclick="saveSession()">Save</button>
    <button type="button" onclick="exportCSV()">Export</button>
    <button class="danger" type="button" onclick="clearForm()">Clear</button>
  </nav>

  <script src="./script.js"></script>
</body>
</html>
